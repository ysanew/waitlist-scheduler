services:
  postgres:
    image: postgres:16-alpine
    container_name: wls_postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wls}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wls}
      POSTGRES_DB: ${POSTGRES_DB:-wls}
    volumes:
      - wls_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wls}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wls_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wls_postgres_data:
